<!DOCTYPE html>
<html>

<head>

<title>Dungeon Conqueror</title>

<style>

body{
    background:black;
    color:white;
    font-family:Arial;
    text-align:center;
    margin:0;
}

.container{
    width:90%;
    margin:auto;
    padding:20px;
}

h1{
    color:darkred;
    font-size:45px;
}

.game-box{
    background:#111;
    border:2px solid darkred;
    padding:20px;
    margin-top:20px;
}

button{
    background:darkred;
    color:white;
    border:none;
    padding:12px 20px;
    margin:10px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:red;
}

.class-container{
    display:flex;
    justify-content:space-around;
    flex-wrap:wrap;
}

.class-box{
    width:30%;
    border:2px solid darkred;
    background:#111;
    padding:20px;
    margin-top:20px;
}

.hidden{
    display:none;
}

</style>

</head>

<body>

<div class="container">

<h1>
Welcome To My Dungeon
</h1>

<p>
Pick a class and start your adventure. Once you enter the dungeon there is no turning back.
</p>

<div id="classSelect" class="class-container">

<div class="class-box">

<h2>Warrior ⚔️</h2>

<p>Weapon: Sword</p>

<button onclick="startGame('warrior')">
Choose Warrior
</button>

</div>

<div class="class-box">

<h2>Archer 🏹</h2>

<p>Weapon: Bow and Arrow</p>

<button onclick="startGame('archer')">
Choose Archer
</button>

</div>

<div class="class-box">

<h2>Mage 🪄</h2>

<p>Weapon: Staff</p>

<button onclick="startGame('mage')">
Choose Mage
</button>

</div>

</div>

<div id="gameArea" class="game-box hidden">

<h2 id="title"></h2>

<p id="text"></p>

<div id="buttons"></div>

</div>

</div>

<script>

var holyMagic = false;

function startGame(playerClass){

document.getElementById("classSelect").classList.add("hidden");

document.getElementById("gameArea").classList.remove("hidden");

if(playerClass == "warrior"){
warriorStart();
}

if(playerClass == "archer"){
archerStart();
}

if(playerClass == "mage"){
mageStart();
}

}

function showScene(title,text,buttons){

document.getElementById("title").innerHTML = title;

document.getElementById("text").innerHTML = text;

document.getElementById("buttons").innerHTML = buttons;

}

////////////////////////
//// WARRIOR
////////////////////////

function warriorStart(){

showScene(

"⚔️ Warrior Skills",

"Choose your starting skill <br><br>" +

"<b>Heavy Strike</b> - Gain 20% more attack power <br><br>" +

"<b>Quick Draw</b> - Gain 30% faster attack speed <br><br>" +

"<b>Resistance</b> - Take 20% less damage",

"<button onclick='warriorLevel1()'>Heavy Strike</button>" +

"<button onclick='warriorLevel1()'>Quick Draw</button>" +

"<button onclick='warriorLevel1()'>Resistance</button>"

);

}

function warriorLevel1(){

showScene(

"👹 Level 1 - Goblins",

"There are 3 goblins ahead of you",

"<button onclick='warriorPassive()'>Attack</button>" +

"<button onclick='dead()'>Died</button>"

);

}

function warriorPassive(){

showScene(

"⚔️ Passive Skills",

"Congratulations you beat level 1. Choose a passive skill <br><br>" +

"<b>Berserk</b> - Every monster kill gives you more attack power <br><br>" +

"<b>Latent Retribution</b> - Waiting before attacking makes your next hit stronger <br><br>" +

"<b>Health Threshold</b> - Low health gives you a chance to block attacks",

"<button onclick='warriorLevel2()'>Berserk</button>" +

"<button onclick='warriorLevel2()'>Latent Retribution</button>" +

"<button onclick='warriorLevel2()'>Health Threshold</button>"

);

}

function warriorLevel2(){

showScene(

"🐺 Level 2 - Wolves",

"3 packs of wolves appear from the dark",

"<button onclick='warriorUltimate()'>Attack</button>" +

"<button onclick='dead()'>Died</button>"

);

}

function warriorUltimate(){

showScene(

"⚔️ New Skill",

"Choose your new skill <br><br>" +

"<b>Devastate</b> - Smash the ground and create a giant shockwave <br><br>" +

"<b>Impact</b> - Your next attack always lands a critical hit <br><br>" +

"<b>Mortal Spin</b> - Spin like a tornado and hit every enemy around you",

"<button onclick='warriorLevel3()'>Devastate</button>" +

"<button onclick='warriorLevel3()'>Impact</button>" +

"<button onclick='warriorLevel3()'>Mortal Spin</button>"

);

}

function warriorLevel3(){

showScene(

"👻 Level 3 - Ghosts",

"Your sword goes through the ghosts",

"<button onclick='warriorDeath()'>Attack</button>"

);

}

function warriorDeath(){

showScene(

"☠️ Defeat",

"The ghosts cannot be hurt by your sword",

"<button onclick='restartGame()'>Restart</button>" +

"<button onclick='warriorLevel3()'>Redo</button>"

);

}

////////////////////////
//// ARCHER
////////////////////////

function archerStart(){

showScene(

"🏹 Archer Skills",

"Choose your starting skill <br><br>" +

"<b>Triple Arrow</b> - Shoot 3 arrows at once <br><br>" +

"<b>Quick Shot</b> - Fire arrows much faster <br><br>" +

"<b>Piercing Arrows</b> - Arrows travel through multiple enemies",

"<button onclick='archerLevel1()'>Triple Arrow</button>" +

"<button onclick='archerLevel1()'>Quick Shot</button>" +

"<button onclick='archerLevel1()'>Piercing Arrows</button>"

);

}

function archerLevel1(){

showScene(

"👹 Level 1 - Goblins",

"3 goblins rush toward you",

"<button onclick='archerPower()'>Attack</button>" +

"<button onclick='dead()'>Died</button>"

);

}

function archerPower(){

showScene(

"🏹 Arrow Powers",

"Congratulations you beat level 1. Pick a power <br><br>" +

"<b>Ice Arrows</b> - Slow enemies when hit <br><br>" +

"<b>Fire Arrows</b> - Burn enemies over time <br><br>" +

"<b>Poison Arrows</b> - Poison enemies and deal damage slowly",

"<button onclick='archerLevel2()'>Ice Arrows</button>" +

"<button onclick='archerLevel2()'>Fire Arrows</button>" +

"<button onclick='archerLevel2()'>Poison Arrows</button>"

);

}

function archerLevel2(){

showScene(

"🐺 Level 2 - Wolves",

"Wolves surround you from every side",

"<button onclick='archerUltimate()'>Attack</button>" +

"<button onclick='dead()'>Died</button>"

);

}

function archerUltimate(){

showScene(

"🏹 New Skill",

"Choose your new skill <br><br>" +

"<b>Raining Arrows</b> - Shoot arrows into the sky and rain them down <br><br>" +

"<b>Tracking Arrow</b> - Missed arrows follow enemies <br><br>" +

"<b>Scatter Arrow</b> - Fire arrows in every direction",

"<button onclick='archerLevel3()'>Raining Arrows</button>" +

"<button onclick='archerLevel3()'>Tracking Arrow</button>" +

"<button onclick='archerLevel3()'>Scatter Arrow</button>"

);

}

function archerLevel3(){

showScene(

"👻 Level 3 - Ghosts",

"Your arrows pass through the ghosts",

"<button onclick='archerDeath()'>Attack</button>"

);

}

function archerDeath(){

showScene(

"☠️ Defeat",

"The ghosts cannot be hit by arrows",

"<button onclick='restartGame()'>Restart</button>" +

"<button onclick='archerLevel3()'>Redo</button>"

);

}

////////////////////////
//// MAGE
////////////////////////

function mageStart(){

showScene(

"🪄 Mage Skills",

"Choose your starting magic <br><br>" +

"<b>Ice Magic</b> - Freeze enemies and slow them down <br><br>" +

"<b>Fire Magic</b> - Burn enemies with flames <br><br>" +

"<b>Lightning Magic</b> - Shock enemies and stun them",

"<button onclick='mageLevel1()'>Ice Magic</button>" +

"<button onclick='mageLevel1()'>Fire Magic</button>" +

"<button onclick='mageLevel1()'>Lightning Magic</button>"

);

}

function mageLevel1(){

showScene(

"👹 Level 1 - Goblins",

"3 goblins stand in front of you",

"<button onclick='magePower()'>Attack</button>" +

"<button onclick='dead()'>Died</button>"

);

}

function magePower(){

showScene(

"✨ Advanced Magic",

"Choose a new magic skill <br><br>" +

"<b>Holy Magic</b> - Strong against ghosts and undead enemies <br><br>" +

"<b>Shadow Magic</b> - Trap enemies using shadows <br><br>" +

"<b>Necromancy Magic</b> - Summon undead creatures to help you fight",

"<button onclick='holy()'>Holy Magic</button>" +

"<button onclick='mageLevel2()'>Shadow Magic</button>" +

"<button onclick='mageLevel2()'>Necromancy Magic</button>"

);

}

function holy(){

holyMagic = true;

mageLevel2();

}

function mageLevel2(){

showScene(

"🐺 Level 2 - Wolves",

"3 packs of wolves attack you",

"<button onclick='mageElement()'>Attack</button>" +

"<button onclick='dead()'>Died</button>"

);

}

function mageElement(){

showScene(

"🌪️ Element Magic",

"Choose your new magic <br><br>" +

"<b>Wind Magic</b> - Create sharp wind slashes <br><br>" +

"<b>Earth Magic</b> - Throw rocks and trap enemies with vines <br><br>" +

"<b>Water Magic</b> - Create water attacks and drown enemies",

"<button onclick='mageLevel3()'>Wind Magic</button>" +

"<button onclick='mageLevel3()'>Earth Magic</button>" +

"<button onclick='mageLevel3()'>Water Magic</button>"

);

}

function mageLevel3(){

if(holyMagic == true){

showScene(

"👻 Level 3 - Ghosts",

"Your Holy Magic destroys the ghosts",

"<button onclick='mageFinal()'>Attack</button>"

);

}

else{

showScene(

"☠️ Defeat",

"Your magic cannot hurt the ghosts",

"<button onclick='restartGame()'>Restart</button>" +

"<button onclick='magePower()'>Redo</button>"

);

}

}

function mageFinal(){

showScene(

"🪄 Final Skill",

"Choose your final skill <br><br>" +

"<b>Meteor</b> - Summon a giant meteor from the sky <br><br>" +

"<b>Judgement</b> - Holy swords rain down on enemies <br><br>" +

"<b>Death</b> - Instantly destroy your enemy",

"<button onclick='bossFight()'>Meteor</button>" +

"<button onclick='bossFight()'>Judgement</button>" +

"<button onclick='bossFight()'>Death</button>"

);

}

function bossFight(){

showScene(

"💀 Skeleton King",

"The Skeleton King stands before you",

"<button onclick='win()'>Attack</button>" +

"<button onclick='dead()'>Died</button>"

);

}

////////////////////////
//// ENDINGS
////////////////////////

function win(){

showScene(

"🏆 Victory",

"Congratulations you conquered the dungeon!",

"<button onclick='restartGame()'>Home</button>"

);

}

function dead(){

showScene(

"☠️ You Died",

"Your adventure has ended",

"<button onclick='restartGame()'>Restart</button>"

);

}

function restartGame(){

location.reload();

}

</script>

</body>

</html>
