<!doctype html>
<html>

<head>

    <title>Dungeon Conqueror</title>

    <style>

        body{
            background: black;
            color: white;
            font-family: Arial;
            text-align: center;
        }

        h1{
            color: darkred;
        }

        .box{
            border: 2px solid darkred;
            padding: 20px;
            margin: 20px;
            background: #111;
        }

        button{
            background: darkred;
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 10px;
            font-size: 16px;
        }

        button:hover{
            background: red;
        }

    </style>

</head>

<body>

    <h1>
        Welcome to My Dungeon
    </h1>

    <p>
        Pick A Class and Start Your Adventure
    </p>

    <!-- CLASS MENU -->

    <div id="menu">

        <div class="box">

            <h2>Warrior ⚔️</h2>

            <p>Weapon: Sword</p>

            <button onclick="warriorStart()">
                Choose Warrior
            </button>

        </div>

        <div class="box">

            <h2>Archer 🏹</h2>

            <p>Weapon: Bow and Arrow</p>

            <button onclick="archerStart()">
                Choose Archer
            </button>

        </div>

        <div class="box">

            <h2>Mage 🪄</h2>

            <p>Weapon: Staff</p>

            <button onclick="mageStart()">
                Choose Mage
            </button>

        </div>

    </div>

    <!-- GAME AREA -->

    <div id="game" class="box">

        <h2 id="title"></h2>

        <p id="text"></p>

        <div id="buttons"></div>

    </div>

<script>

    var holyMagic = false;

    function showGame(title,text,buttons){

        document.getElementById("menu").style.display = "none";

        document.getElementById("title").innerHTML = title;

        document.getElementById("text").innerHTML = text;

        document.getElementById("buttons").innerHTML = buttons;

    }

    // WARRIOR

    function warriorStart(){

        showGame(
            "⚔️ Warrior Skills",
            "Choose your skill",
            
            "<button onclick='warriorLevel1()'>Heavy Strike</button>" +

            "<button onclick='warriorLevel1()'>Quick Draw</button>" +

            "<button onclick='warriorLevel1()'>Resistance</button>"
        );

    }

    function warriorLevel1(){

        showGame(
            "👹 Level 1 - Goblins",
            "There are 3 goblins ahead of you",

            "<button onclick='warriorLevel2()'>Attack</button>" +

            "<button onclick='dead()'>Died</button>"
        );

    }

    function warriorLevel2(){

        showGame(
            "🐺 Level 2 - Wolves",
            "3 packs of wolves appear",

            "<button onclick='warriorLevel3()'>Attack</button>" +

            "<button onclick='dead()'>Died</button>"
        );

    }

    function warriorLevel3(){

        showGame(
            "👻 Level 3 - Ghosts",
            "Your sword cannot hurt ghosts",

            "<button onclick='dead()'>Attack</button>"
        );

    }

    // ARCHER

    function archerStart(){

        showGame(
            "🏹 Archer Skills",
            "Choose your skill",

            "<button onclick='archerLevel1()'>Triple Arrow</button>" +

            "<button onclick='archerLevel1()'>Quick Shot</button>" +

            "<button onclick='archerLevel1()'>Piercing Arrows</button>"
        );

    }

    function archerLevel1(){

        showGame(
            "👹 Level 1 - Goblins",
            "There are 3 goblins ahead of you",

            "<button onclick='archerLevel2()'>Attack</button>" +

            "<button onclick='dead()'>Died</button>"
        );

    }

    function archerLevel2(){

        showGame(
            "🐺 Level 2 - Wolves",
            "3 packs of wolves appear",

            "<button onclick='archerLevel3()'>Attack</button>" +

            "<button onclick='dead()'>Died</button>"
        );

    }

    function archerLevel3(){

        showGame(
            "👻 Level 3 - Ghosts",
            "Your arrows go through the ghosts",

            "<button onclick='dead()'>Attack</button>"
        );

    }

    // MAGE

    function mageStart(){

        showGame(
            "🪄 Mage Skills",
            "Choose your magic",

            "<button onclick='mageLevel1()'>Ice Magic</button>" +

            "<button onclick='mageLevel1()'>Fire Magic</button>" +

            "<button onclick='mageLevel1()'>Lightning Magic</button>"
        );

    }

    function mageLevel1(){

        showGame(
            "🪄 Choose Advanced Magic",
            "Holy Magic can defeat ghosts",

            "<button onclick='holy()'>Holy Magic</button>" +

            "<button onclick='mageLevel2()'>Shadow Magic</button>" +

            "<button onclick='mageLevel2()'>Necromancy Magic</button>"
        );

    }

    function holy(){

        holyMagic = true;

        mageLevel2();

    }

    function mageLevel2(){

        showGame(
            "🐺 Level 2 - Wolves",
            "3 packs of wolves attack",

            "<button onclick='mageLevel3()'>Attack</button>" +

            "<button onclick='dead()'>Died</button>"
        );

    }

    function mageLevel3(){

        if(holyMagic == true){

            showGame(
                "👻 Level 3 - Ghosts",
                "Your Holy Magic defeats the ghosts",

                "<button onclick='bossFight()'>Attack</button>"
            );

        }

        else{

            dead();

        }

    }

    function bossFight(){

        showGame(
            "💀 Final Boss",
            "The Skeleton King appears",

            "<button onclick='win()'>Attack</button>" +

            "<button onclick='dead()'>Died</button>"
        );

    }

    // ENDINGS

    function win(){

        showGame(
            "🏆 Victory",
            "You conquered the dungeon!",

            "<button onclick='restart()'>Home</button>"
        );

    }

    function dead(){

        showGame(
            "☠️ You Died",
            "Game Over",

            "<button onclick='restart()'>Restart</button>"
        );

    }

    function restart(){

        location.reload();

    }

</script>

</body>

</html>
