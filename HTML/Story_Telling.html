<!doctype html>
<html>

<head>

    <title>Dungeon Conqueror</title>

<style>

body{
    background: black;
    color: white;
    font-family: Arial;
    text-align: center;
    margin: 0;
}

.container{
    width: 90%;
    margin: auto;
    padding: 20px;
}

h1{
    color: darkred;
    font-size: 45px;
}

.game-box{
    background: #111;
    border: 2px solid darkred;
    padding: 20px;
    margin-top: 20px;
}

button{
    background: darkred;
    color: white;
    border: none;
    padding: 12px 20px;
    margin: 10px;
    font-size: 16px;
    cursor: pointer;
}

button:hover{
    background: red;
}

.class-container{
    display: flex;
    justify-content: space-around;
    flex-wrap: wrap;
}

.class-box{
    width: 30%;
    border: 2px solid darkred;
    background: #111;
    padding: 20px;
    margin-top: 20px;
}

.hidden{
    display: none;
}

</style>

</head>

<body>

<div class="container">

<h1>
Welcome To My Dungeon
</h1>

<p>
Pick a class and start your adventure
</p>

<!-- CLASS MENU -->

<div id="classSelect" class="class-container">

    <!-- WARRIOR -->

    <div class="class-box">

        <h2>Warrior ⚔️</h2>

        <p>Weapon: Sword</p>

        <button onclick="startGame('warrior')">
            Choose Warrior
        </button>

    </div>

    <!-- ARCHER -->

    <div class="class-box">

        <h2>Archer 🏹</h2>

        <p>Weapon: Bow and Arrow</p>

        <button onclick="startGame('archer')">
            Choose Archer
        </button>

    </div>

    <!-- MAGE -->

    <div class="class-box">

        <h2>Mage 🪄</h2>

        <p>Weapon: Staff</p>

        <button onclick="startGame('mage')">
            Choose Mage
        </button>

    </div>

</div>

<!-- GAME AREA -->

<div id="gameArea" class="game-box hidden">

    <h2 id="title"></h2>

    <p id="text"></p>

    <div id="buttons"></div>

</div>

</div>

<script>

var holyMagic = false;

function startGame(playerClass){

    document.getElementById("classSelect").classList.add("hidden");

    document.getElementById("gameArea").classList.remove("hidden");

    if(playerClass == "warrior"){
        warriorStart();
    }

    if(playerClass == "archer"){
        archerStart();
    }

    if(playerClass == "mage"){
        mageStart();
    }

}

function showScene(title,text,buttons){

    document.getElementById("title").innerHTML = title;

    document.getElementById("text").innerHTML = text;

    document.getElementById("buttons").innerHTML = buttons;

}

/////////////////////////
// WARRIOR
/////////////////////////

function warriorStart(){

showScene(

"⚔️ Warrior Skills",

"Choose your starting skill",

"<button onclick='warriorLevel1()'>Heavy Strike</button>" +

"<button onclick='warriorLevel1()'>Quick Draw</button>" +

"<button onclick='warriorLevel1()'>Resistance</button>"

);

}

function warriorLevel1(){

showScene(

"👹 Level 1 - Goblins",

"There are 3 goblins ahead of you",

"<button onclick='warriorPassive()'>Attack</button>" +

"<button onclick='dead()'>Died</button>"

);

}

function warriorPassive(){

showScene(

"⚔️ Passive Skills",

"Congratulations you beat level 1. Choose a passive skill",

"<button onclick='warriorLevel2()'>Berserk</button>" +

"<button onclick='warriorLevel2()'>Latent Retribution</button>" +

"<button onclick='warriorLevel2()'>Health Threshold</button>"

);

}

function warriorLevel2(){

showScene(

"🐺 Level 2 - Wolves",

"3 packs of wolves appear from the dark",

"<button onclick='warriorUltimate()'>Attack</button>" +

"<button onclick='dead()'>Died</button>"

);

}

function warriorUltimate(){

showScene(

"⚔️ New Skill",

"Choose your new skill",

"<button onclick='warriorLevel3()'>Devastate</button>" +

"<button onclick='warriorLevel3()'>Impact</button>" +

"<button onclick='warriorLevel3()'>Mortal Spin</button>"

);

}

function warriorLevel3(){

showScene(

"👻 Level 3 - Ghosts",

"Your sword goes through the ghosts",

"<button onclick='warriorDeath()'>Attack</button>"

);

}

function warriorDeath(){

showScene(

"☠️ Defeat",

"The ghosts cannot be hurt by your sword",

"<button onclick='restartGame()'>Restart</button>" +

"<button onclick='warriorLevel3()'>Redo</button>"

);

}

/////////////////////////
// ARCHER
/////////////////////////

function archerStart(){

showScene(

"🏹 Archer Skills",

"Choose your starting skill",

"<button onclick='archerLevel1()'>Triple Arrow</button>" +

"<button onclick='archerLevel1()'>Quick Shot</button>" +

"<button onclick='archerLevel1()'>Piercing Arrows</button>"

);

}

function archerLevel1(){

showScene(

"👹 Level 1 - Goblins",

"3 goblins rush toward you",

"<button onclick='archerPower()'>Attack</button>" +

"<button onclick='dead()'>Died</button>"

);

}

function archerPower(){

showScene(

"🏹 Arrow Powers",

"Congratulations you beat level 1. Pick a power",

"<button onclick='archerLevel2()'>Ice Arrows</button>" +

"<button onclick='archerLevel2()'>Fire Arrows</button>" +

"<button onclick='archerLevel2()'>Poison Arrows</button>"

);

}

function archerLevel2(){

showScene(

"🐺 Level 2 - Wolves",

"Wolves surround you from every side",

"<button onclick='archerUltimate()'>Attack</button>" +

"<button onclick='dead()'>Died</button>"

);

}

function archerUltimate(){

showScene(

"🏹 New Skill",

"Choose your new skill",

"<button onclick='archerLevel3()'>Raining Arrows</button>" +

"<button onclick='archerLevel3()'>Tracking Arrow</button>" +

"<button onclick='archerLevel3()'>Scatter Arrow</button>"

);

}

function archerLevel3(){

showScene(

"👻 Level 3 - Ghosts",

"Your arrows pass through the ghosts",

"<button onclick='archerDeath()'>Attack</button>"

);

}

function archerDeath(){

showScene(

"☠️ Defeat",

"The ghosts cannot be hit by arrows",

"<button onclick='restartGame()'>Restart</button>" +

"<button onclick='archerLevel3()'>Redo</button>"

);

}

/////////////////////////
// MAGE
/////////////////////////

function mageStart(){

showScene(

"🪄 Mage Skills",

"Choose your starting magic",

"<button onclick='mageLevel1()'>Ice Magic</button>" +

"<button onclick='mageLevel1()'>Fire Magic</button>" +

"<button onclick='mageLevel1()'>Lightning Magic</button>"

);

}

function mageLevel1(){

showScene(

"👹 Level 1 - Goblins",

"3 goblins stand in front of you",

"<button onclick='magePower()'>Attack</button>" +

"<button onclick='dead()'>Died</button>"

);

}

function magePower(){

showScene(

"✨ Advanced Magic",

"Choose a new magic skill",

"<button onclick='holy()'>Holy Magic</button>" +

"<button onclick='mageLevel2()'>Shadow Magic</button>" +

"<button onclick='mageLevel2()'>Necromancy Magic</button>"

);

}

function holy(){

holyMagic = true;

mageLevel2();

}

function mageLevel2(){

showScene(

"🐺 Level 2 - Wolves",

"3 packs of wolves attack you",

"<button onclick='mageElement()'>Attack</button>" +

"<button onclick='dead()'>Died</button>"

);

}

function mageElement(){

showScene(

"🌪️ Element Magic",

"Choose your new magic",

"<button onclick='mageLevel3()'>Wind Magic</button>" +

"<button onclick='mageLevel3()'>Earth Magic</button>" +

"<button onclick='mageLevel3()'>Water Magic</button>"

);

}

function mageLevel3(){

if(holyMagic == true){

showScene(

"👻 Level 3 - Ghosts",

"Your Holy Magic destroys the ghosts",

"<button onclick='mageFinal()'>Attack</button>"

);

}

else{

showScene(

"☠️ Defeat",

"Your magic cannot hurt the ghosts",

"<button onclick='restartGame()'>Restart</button>" +

"<button onclick='magePower()'>Redo</button>"

);

}

}

function mageFinal(){

showScene(

"🪄 Final Skill",

"Choose your final skill",

"<button onclick='bossFight()'>Meteor</button>" +

"<button onclick='bossFight()'>Judgement</button>" +

"<button onclick='bossFight()'>Death</button>"

);

}

function bossFight(){

showScene(

"💀 Skeleton King",

"The Skeleton King stands before you",

"<button onclick='win()'>Attack</button>" +

"<button onclick='dead()'>Died</button>"

);

}

/////////////////////////
// ENDINGS
/////////////////////////

function win(){

showScene(

"🏆 Victory",

"Congratulations you conquered the dungeon!",

"<button onclick='restartGame()'>Home</button>"

);

}

function dead(){

showScene(

"☠️ You Died",

"Your adventure has ended",

"<button onclick='restartGame()'>Restart</button>"

);

}

function restartGame(){

location.reload();

}

</script>

</body>

</html>
