<!DOCTYPE html>
<html>

<head>

    <title>Dungeon Game</title>

    <style>

        body{
            background-color:black;
            color:white;
            text-align:center;
            font-family:Arial;
        }

        .box{
            border:2px solid red;
            padding:20px;
            margin:20px;
        }

        button{
            background-color:darkred;
            color:white;
            padding:10px;
            margin:10px;
        }

    </style>

</head>

<body>

    <h1 style="color:darkred;">
        Welcome to My Dungeon
    </h1>

    <p>
        Pick A Class and Start Your Adventure
    </p>

    <!-- CLASS CHOICES -->

    <div id="classes">

        <div class="box">

            <h2>Warrior ⚔️</h2>

            <p>Weapon: Sword</p>

            <p>
                Heavy Strike<br>
                Quick Draw<br>
                Resistance
            </p>

            <button onclick="warrior()">
                Choose Warrior
            </button>

        </div>

        <div class="box">

            <h2>Archer 🏹</h2>

            <p>Weapon: Bow and Arrow</p>

            <p>
                Triple Arrow<br>
                Quick Shot<br>
                Piercing Arrows
            </p>

            <button onclick="archer()">
                Choose Archer
            </button>

        </div>

        <div class="box">

            <h2>Mage 🪄</h2>

            <p>Weapon: Staff</p>

            <p>
                Ice Magic<br>
                Fire Magic<br>
                Lightning Magic
            </p>

            <button onclick="mage()">
                Choose Mage
            </button>

        </div>

    </div>

    <!-- GAME AREA -->

    <div id="game" class="box">

        <h2 id="title"></h2>

        <p id="text"></p>

        <div id="buttons"></div>

    </div>

<script>

    var holyMagic = false;

    function warrior(){

        document.getElementById("title").innerHTML =
        "Level 1 - Goblins 👹";

        document.getElementById("text").innerHTML =
        "There are 3 goblins ahead of you";

        document.getElementById("buttons").innerHTML =

        "<button onclick='warrior2()'>Attack</button>" +

        "<button onclick='dead()'>Died</button>";
    }

    function warrior2(){

        document.getElementById("title").innerHTML =
        "Level 2 - Wolves 🐺";

        document.getElementById("text").innerHTML =
        "3 packs of wolves appear";

        document.getElementById("buttons").innerHTML =

        "<button onclick='warrior3()'>Attack</button>" +

        "<button onclick='dead()'>Died</button>";
    }

    function warrior3(){

        document.getElementById("title").innerHTML =
        "Level 3 - Ghosts 👻";

        document.getElementById("text").innerHTML =
        "Your sword cannot hurt ghosts";

        document.getElementById("buttons").innerHTML =

        "<button onclick='dead()'>Attack</button>";
    }

    // ARCHER

    function archer(){

        document.getElementById("title").innerHTML =
        "Level 1 - Goblins 👹";

        document.getElementById("text").innerHTML =
        "There are 3 goblins ahead of you";

        document.getElementById("buttons").innerHTML =

        "<button onclick='archer2()'>Attack</button>" +

        "<button onclick='dead()'>Died</button>";
    }

    function archer2(){

        document.getElementById("title").innerHTML =
        "Level 2 - Wolves 🐺";

        document.getElementById("text").innerHTML =
        "3 packs of wolves appear";

        document.getElementById("buttons").innerHTML =

        "<button onclick='archer3()'>Attack</button>" +

        "<button onclick='dead()'>Died</button>";
    }

    function archer3(){

        document.getElementById("title").innerHTML =
        "Level 3 - Ghosts 👻";

        document.getElementById("text").innerHTML =
        "Your arrows go through the ghosts";

        document.getElementById("buttons").innerHTML =

        "<button onclick='dead()'>Attack</button>";
    }

    // MAGE

    function mage(){

        document.getElementById("title").innerHTML =
        "Choose Your Magic";

        document.getElementById("text").innerHTML =
        "Holy Magic is strong against ghosts";

        document.getElementById("buttons").innerHTML =

        "<button onclick='holy()'>Holy Magic</button>" +

        "<button onclick='mage2()'>Shadow Magic</button>";
    }

    function holy(){

        holyMagic = true;

        mage2();
    }

    function mage2(){

        document.getElementById("title").innerHTML =
        "Level 2 - Wolves 🐺";

        document.getElementById("text").innerHTML =
        "3 packs of wolves attack";

        document.getElementById("buttons").innerHTML =

        "<button onclick='mage3()'>Attack</button>" +

        "<button onclick='dead()'>Died</button>";
    }

    function mage3(){

        if(holyMagic == true){

            document.getElementById("title").innerHTML =
            "Level 3 - Ghosts 👻";

            document.getElementById("text").innerHTML =
            "Your Holy Magic defeats the ghosts";

            document.getElementById("buttons").innerHTML =

            "<button onclick='boss()'>Attack</button>";

        }

        else{

            dead();

        }

    }

    function boss(){

        document.getElementById("title").innerHTML =
        "Final Boss 💀";

        document.getElementById("text").innerHTML =
        "The Skeleton King appears";

        document.getElementById("buttons").innerHTML =

        "<button onclick='win()'>Attack</button>" +

        "<button onclick='dead()'>Died</button>";
    }

    // ENDINGS

    function win(){

        document.getElementById("title").innerHTML =
        "🏆 Victory";

        document.getElementById("text").innerHTML =
        "You conquered the dungeon";

        document.getElementById("buttons").innerHTML =

        "<button onclick='restart()'>Home</button>";
    }

    function dead(){

        document.getElementById("title").innerHTML =
        "☠️ You Died";

        document.getElementById("text").innerHTML =
        "Game Over";

        document.getElementById("buttons").innerHTML =

        "<button onclick='restart()'>Restart</button>";
    }

    function restart(){

        location.reload();

    }

</script>

</body>
</html>
