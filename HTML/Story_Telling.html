<!DOCTYPE html>
<html>

<head>

<title>Dungeon Conqueror</title>

<style>

body{
    background: black;
    color: white;
    font-family: Arial;
    text-align: center;
    margin: 0;
}

.container{
    width: 90%;
    margin: auto;
    padding: 20px;
}

h1{
    color: darkred;
    font-size: 45px;
}

.game-box{
    background: #111;
    border: 2px solid darkred;
    padding: 20px;
    margin-top: 20px;
}

button{
    background: darkred;
    color: white;
    border: none;
    padding: 12px 20px;
    margin: 10px;
    font-size: 16px;
    cursor: pointer;
}

button:hover{
    background: red;
}

.class-container{
    display: flex;
    justify-content: space-around;
    flex-wrap: wrap;
}

.class-box{
    width: 30%;
    border: 2px solid darkred;
    background: #111;
    padding: 20px;
    margin-top: 20px;
}

.hidden{
    display: none;
}

</style>

</head>

<body>

<div class="container">

<h1>
Welcome To My Dungeon
</h1>

<p>
Pick a class and begin your adventure
</p>

<!-- CLASSES -->

<div id="classSelect" class="class-container">

<div class="class-box">

<h2>Warrior ⚔️</h2>

<p>Weapon: Sword</p>

<p>
Heavy Strike<br>
Quick Draw<br>
Resistance
</p>

<button onclick="startGame('warrior')">
Choose Warrior
</button>

</div>

<div class="class-box">

<h2>Archer 🏹</h2>

<p>Weapon: Bow and Arrow</p>

<p>
Triple Arrow<br>
Quick Shot<br>
Piercing Arrows
</p>

<button onclick="startGame('archer')">
Choose Archer
</button>

</div>

<div class="class-box">

<h2>Mage 🪄</h2>

<p>Weapon: Staff</p>

<p>
Ice Magic<br>
Fire Magic<br>
Lightning Magic
</p>

<button onclick="startGame('mage')">
Choose Mage
</button>

</div>

</div>

<!-- GAME AREA -->

<div id="gameArea" class="game-box hidden">

<h2 id="title"></h2>

<p id="text"></p>

<div id="buttons"></div>

</div>

</div>

<script>

var holyMagic = false;

function startGame(chosenClass){

    document.getElementById("classSelect").classList.add("hidden");

    document.getElementById("gameArea").classList.remove("hidden");

    if(chosenClass == "warrior"){
        warriorStart();
    }

    if(chosenClass == "archer"){
        archerStart();
    }

    if(chosenClass == "mage"){
        mageStart();
    }

}

function showScene(title,text,buttons){

    document.getElementById("title").innerHTML = title;

    document.getElementById("text").innerHTML = text;

    document.getElementById("buttons").innerHTML = buttons;

}

/////////////////////
// WARRIOR
/////////////////////

function warriorStart(){

showScene(
"⚔️ Warrior Skills",
"Choose your skill",
"<button onclick='warriorLevel1()'>Heavy Strike</button>" +

"<button onclick='warriorLevel1()'>Quick Draw</button>" +

"<button onclick='warriorLevel1()'>Resistance</button>"
);

}

function warriorLevel1(){

showScene(
"👹 Goblins",
"3 goblins stand in front of you",
"<button onclick='warriorLevel2()'>Attack</button>" +

"<button onclick='dead()'>Run Away</button>"
);

}

function warriorLevel2(){

showScene(
"🐺 Wolves",
"3 packs of wolves appear from the dark",
"<button onclick='warriorLevel3()'>Attack</button>" +

"<button onclick='dead()'>Run Away</button>"
);

}

function warriorLevel3(){

showScene(
"👻 Ghosts",
"Your sword goes through the ghosts",
"<button onclick='dead()'>Attack</button>"
);

}

/////////////////////
// ARCHER
/////////////////////

function archerStart(){

showScene(
"🏹 Archer Skills",
"Choose your skill",
"<button onclick='archerLevel1()'>Triple Arrow</button>" +

"<button onclick='archerLevel1()'>Quick Shot</button>" +

"<button onclick='archerLevel1()'>Piercing Arrows</button>"
);

}

function archerLevel1(){

showScene(
"👹 Goblins",
"3 goblins rush toward you",
"<button onclick='archerLevel2()'>Attack</button>" +

"<button onclick='dead()'>Run Away</button>"
);

}

function archerLevel2(){

showScene(
"🐺 Wolves",
"Wolves surround you from every side",
"<button onclick='archerLevel3()'>Attack</button>" +

"<button onclick='dead()'>Run Away</button>"
);

}

function archerLevel3(){

showScene(
"👻 Ghosts",
"Your arrows pass through the ghosts",
"<button onclick='dead()'>Attack</button>"
);

}

/////////////////////
// MAGE
/////////////////////

function mageStart(){

showScene(
"🪄 Mage Magic",
"Choose your magic",
"<button onclick='mageLevel1()'>Ice Magic</button>" +

"<button onclick='mageLevel1()'>Fire Magic</button>" +

"<button onclick='mageLevel1()'>Lightning Magic</button>"
);

}

function mageLevel1(){

showScene(
"✨ Choose Advanced Magic",
"Holy Magic can hurt ghosts",
"<button onclick='holy()'>Holy Magic</button>" +

"<button onclick='mageLevel2()'>Shadow Magic</button>" +

"<button onclick='mageLevel2()'>Necromancy</button>"
);

}

function holy(){

holyMagic = true;

mageLevel2();

}

function mageLevel2(){

showScene(
"🐺 Wolves",
"3 packs of wolves attack you",
"<button onclick='mageLevel3()'>Attack</button>" +

"<button onclick='dead()'>Run Away</button>"
);

}

function mageLevel3(){

if(holyMagic == true){

showScene(
"👻 Ghosts",
"Your Holy Magic destroys the ghosts",
"<button onclick='bossFight()'>Continue</button>"
);

}

else{

dead();

}

}

function bossFight(){

showScene(
"💀 Skeleton King",
"The Skeleton King stands before you",
"<button onclick='win()'>Attack</button>" +

"<button onclick='dead()'>Run Away</button>"
);

}

/////////////////////
// ENDINGS
/////////////////////

function win(){

showScene(
"🏆 Victory",
"You conquered the dungeon!",
"<button onclick='restartGame()'>Play Again</button>"
);

}

function dead(){

showScene(
"☠️ You Died",
"Your adventure has ended",
"<button onclick='restartGame()'>Restart</button>"
);

}

function restartGame(){

location.reload();

}

</script>

</body>

</html>
